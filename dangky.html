<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT Lab - Đăng Ký</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./main.js"></script>
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <header class="header">
        <div class="decor">
            <a href="trangchu.html"><img class="logo" src="images/logo.png" alt="logo"></a>
            <img class="img1" src="images/header-img1.png" alt="">
            <img class="img2" src="images/header-img2.png" alt="">
            <img class="img3" src="images/header-img3.png" alt="">
        </div>
        <div class="tabs">
            <nav class="nav">
                <a class="nav--btn" href="trangchu.html">Trang Chủ</a>
                <a class="nav--btn" href="gioithieu.html">Giới Thiệu</a>
                <a class="nav--btn" href="sanpham.html">Sản Phẩm</a>
                <a class="nav--btn" href="tintuc.html">Tin Tức</a>
                <a class="nav--btn" href="dangnhap.html">Đăng Nhập</a>
                <a class="nav--btn" href="dangky.html">Đăng Ký</a>
                <a class="nav--btn" href="lienhe.html">Liên Hệ</a>
            </nav>
            <div class="search">
                <input type="text" class="search--input" value="Nhập nội dung cần tìm">
                <button class="find--btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <button class="cart--btn">
                    <i class="fa-solid fa-cart-arrow-down"></i>
                </button>
            </div>
        </div>
    </header>
    <main>
        <fieldset>
            <legend><b>ĐĂNG KÝ</b></legend>

            <table>
                <tr>
                    <td><b>Email</b></td>
                    <td><input style="margin-left:20px;" type="email" name="txtemail" value="" maxlength="50" placeholder="Vui lòng nhập email" size="30"></td>
                </tr>
                <tr>
                    <td><b>Mật Khẩu</b></td>
                    <td><input style="margin-left:20px;" type="password" name="matkhau" value="" maxlength="50" placeholder="Vui lòng nhập mật khẩu" size="30"></td>
                </tr>
                <tr>
                    <td><b>Nhập Lại Mật Khẩu</b></td>
                    <td><input style="margin-left:20px;" type="password" name="nhaplaimatkhau" value="" maxlength="50" placeholder="Vui lòng nhập mật khẩu" size="30"></td>
                </tr>
                <tr>
                    <td><b>Cấp độ thành viên</b></td>
                    <td>
                        <input type="radio" name="txtcapdothanhvien" value="0"><b>Bạc</b>
                        <input type="radio" name="txtcapdothanhvien" value="1"><b>Vàng</b>
                        <input type="radio" name="txtcapdothanhvien" value="2"><b>Bạch Kim</b>
                    </td>
                </tr>
                <tr>
                    <td><b>Ảnh đại diện</b></td>
                    <td><input type="file"></td>
                </tr>
            </table>
            <span><b>Thông qua việc tạo tài khoản, bạn đồng ý với </b>
            <a href="DieuKhoan.html">Điều khoản & Quyền riêng tư của chúng tôi.</a></span>
            <br>
            <input type="reset" value="Hủy">
            <input type="submit" name="DangNhap" value="Đăng ký"/>
        </fieldset>
    </main>
    <footer class="footer">
        <p>© 2021 Bản quyền thuộc về FreeezeVN. 
            <i class="contact fa-brands fa-facebook-f"></i> 
            <i class="contact fa-brands fa-twitter"></i>
            <i class="contact fa-brands fa-pinterest"></i> 
            <a class="ve-dau-trang" href=""></a>
        </p>
    </footer>
</body>
</html>
